<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Sweet Bakery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>
   <!-- ========== HEADER (cargado automáticamente) ========== -->
  <div id="header-placeholder"></div>
 
  <!-- Espaciador para compensar el header fixed-top -->
  <div class="header-height"></div>

  <!-- Main Content -->
  <main>
    <section class="pt-4 pb-3 px-3">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h2 mb-1">Nuestro Catálogo</h1>
          <p class="text-secondary mb-0">Todos nuestros productos artesanales</p> <br>
              <!-- Filtros -->
<div class="d-flex gap-2 mb-4 overflow-x-auto" style="overflow-y:hidden;scrollbar-width:none;">
  <button class="btn-filtro active" onclick="filtrar(this,'todos')">Todos</button>
  <button class="btn-filtro" onclick="filtrar(this,'Rollos')">🌀 Rollos</button>
  <button class="btn-filtro" onclick="filtrar(this,'Galletas')">🍪 Galletas</button>
  <button class="btn-filtro" onclick="filtrar(this,'Waffles')">🧇 Waffles</button>
  <button class="btn-filtro" onclick="filtrar(this,'Tortas')">🎂 Tortas</button>
  <button class="btn-filtro" onclick="filtrar(this,'Especial')">✨ Especial</button>
</div>
        </div>
      </div>

      <div class="row g-3" id="grid-productos"></div>
    </section>

  </main>

  <!-- Footer -->
  
  <div id="footer-placeholder"></div>
  <div id="bottomnav-placeholder"></div>
 
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
  <!-- Componentes reutilizables (header + footer) -->
  <script src="js/components.js"></script>

  

  <!-- Carrito JS -->
  <script src="js/carrito.js"></script>

  <script src="js/favoritos.js"></script>

  <script>
    let productos = [];

    fetch('http://localhost:3000/api/productos')
  .then(r => r.json())
  .then(data => {
    productos = data;

    // Leer parámetro de búsqueda si viene del header
    const params = new URLSearchParams(window.location.search);
    const buscar = params.get('buscar');
    if (buscar) {
      document.getElementById('search-input-catalogo')?.setAttribute('value', buscar);
      renderProductos(productos.filter(p =>
        p.nombre.toLowerCase().includes(buscar.toLowerCase()) ||
        p.descripcion?.toLowerCase().includes(buscar.toLowerCase())
      ));
    } else {
      renderProductos(productos);
    }
  });

    function renderProductos(lista) {
      const grid = document.getElementById('grid-productos');
      grid.innerHTML = lista.length === 0
        ? '<p class="col-12 text-center text-muted py-4">No hay productos en esta categoría.</p>'
        : lista.map(p => `
          <div class="col-6 col-md-4 col-lg-3">
            <div class="card producto-card h-100">
              <div class="position-relative">
                <img src="${p.imagenPrincipal}" alt="${p.nombre}" class="card-img-top product-img"
                    onerror="this.src='https://via.placeholder.com/300x300?text=🍰'"/>
                <button class="btn-fav ${esFavorito(p._id) ? 'activo' : ''}"
                  onclick="handleFavorito(event, this, ${JSON.stringify(p).replace(/"/g, '&quot;')})">
                  <i class="bi bi-heart${esFavorito(p._id) ? '-fill' : ''}"></i>
                </button>
                <span class="position-absolute top-2 start-2 badge badge-new"></span>
              </div>
              <div class="card-body">
                <h6 class="card-title mb-1">${p.nombre}</h6>
                <p class="card-text text-secondary small mb-2">${p.descripcion || ''}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="precio">$${Number(p.precio).toLocaleString('es-CO')}</span>
                  <a href="detalle.html?id=${p._id}" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-plus"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
        `).join('');
    }

    function filtrar(el, cat) {
  document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (cat === 'todos') {
    renderProductos(productos);
  } else {
    renderProductos(productos.filter(p =>
      p.categoriaId?.nombreCategoria === cat
    ));
  }
}

function handleFavorito(e, btn, producto) {
  e.preventDefault();
  const agregado = toggleFavorito(producto);
  btn.innerHTML = agregado
    ? '<i class="bi bi-heart-fill"></i>'
    : '<i class="bi bi-heart"></i>';
  mostrarNotificacion(agregado ? '¡Guardado en favoritos! ❤️' : 'Quitado de favoritos');
}

    function toggleFavorite(e) {
      e.preventDefault();
      e.target.closest('.btn-fav').classList.toggle('text-danger');
    }



    actualizarContadorCarrito();
  </script>
</body>
</html>
