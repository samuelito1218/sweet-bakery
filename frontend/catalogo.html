    function renderProductos(lista) {
      const grid = document.getElementById('grid-productos');
      grid.innerHTML = lista.length === 0 
        ? '<p class="col-12 text-center text-muted py-4">No hay productos en esta categoría.</p>'
        : lista.map(p => `
          <div class="col-6 col-md-4 col-lg-3">
            <div class="card producto-card h-100">
              <div class="position-relative">
                <img src="${p.imagen}" alt="${p.nombre}" class="card-img-top product-img">
                <button class="btn-fav" onclick="toggleFavorite(event)">
                  <i class="bi bi-heart"></i>
                </button>
                <span class="position-absolute top-2 start-2 badge badge-new">Nuevo</span>
              </div>
              <div class="card-body">
                <h6 class="card-title mb-1">${p.nombre}</h6>
                <p class="card-text text-secondary small mb-2">${p.subtitulo}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="precio">$${p.precio.toFixed(2)}</span>
                  <a href="detalle.html?id=${p.id}" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-plus"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
        `).join('');
    }

    function toggleFavorite(e) {
      e.preventDefault();
      e.target.closest('.btn-fav').classList.toggle('text-danger');
    }

    // Inicializar
    renderProductos(productos);
    updateCartCount();
