    ];

    function getProductId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id')) || 1;
    }

    function renderProduct() {
      const id = getProductId();
      const producto = productos.find(p => p.id === id) || productos[0];
      
      const html = `
        <div class="col-12 col-md-6">
          <img src="${producto.imagen}" alt="${producto.nombre}" class="product-image">
        </div>
        <div class="col-12 col-md-6">
          <h1 class="h3 mb-2">${producto.nombre}</h1>
          <p class="text-secondary mb-3">${producto.subtitulo}</p>
          <p class="h4 text-primary fw-bold mb-4">$${producto.precio.toFixed(2)}</p>
          
          <p class="mb-3">${producto.descripcion}</p>
          
          <div class="mb-4">
            <h6 class="fw-bold mb-2">Ingredientes:</h6>
            ${producto.ingredientes.map(ing => `<span class="ingredient-tag">${ing}</span>`).join('')}
          </div>
          
          <div class="mb-4">
            <label class="d-block fw-bold mb-2">Cantidad:</label>
            <div class="quantity-control">
              <button onclick="decreaseQty()">−</button>
              <span id="quantity">1</span>
              <button onclick="increaseQty()">+</button>
            </div>
          </div>
          
          <button class="btn-primary-custom mb-3" onclick="addToCart(${id})">
            <i class="bi bi-cart-plus"></i> Agregar al Carrito
          </button>
          
          <button class="btn btn-outline-primary w-100">
            <i class="bi bi-heart"></i> Agregar a Favoritos
          </button>
        </div>
      `;
      
      document.getElementById('product-detail').innerHTML = html;
    }

    function increaseQty() { document.getElementById('quantity').textContent = parseInt(document.getElementById('quantity').textContent) + 1; }
    function decreaseQty() { const qty = parseInt(document.getElementById('quantity').textContent); if (qty > 1) document.getElementById('quantity').textContent = qty - 1; }

    function addToCart(productId) {
  const quantity = parseInt(document.getElementById('quantity').textContent);
  const producto = productos.find(p => p.id === productId);
  if (!producto) return;

  const carrito = obtenerCarrito();
  const existente = carrito.find(p => p.id === productId);

  if (existente) {
    existente.cantidad += quantity;
  } else {
    carrito.push({ ...producto, cantidad: quantity });
  }

  guardarCarrito(carrito);
  mostrarNotificacion('¡Agregado al carrito!');
}
renderProduct();
