<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Producto - Sweet Bakery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>
   <!-- ========== HEADER (cargado automáticamente) ========== -->
  <div id="header-placeholder"></div>
 
  <!-- Espaciador para compensar el header fixed-top -->
  <div class="header-height"></div>
  

  <!-- Main Content -->
  <main>
    <div class="container py-4">
      <div class="row">
        <div class="col-12 mb-3">
          <a href="catalogo.html" class="text-decoration-none text-secondary">
            <i class="bi bi-chevron-left"></i> Volver
          </a>
        </div>
      </div>

      <div class="row" id="product-detail"></div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <div id="bottomnav-placeholder"></div>
 
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
  <!-- Componentes reutilizables (header + footer) -->
  <script src="js/components.js"></script>
 
 



  <!-- Carrito JS -->
  <script src="js/carrito.js"></script>

  <script>
    let productoActual = null;

    function getProductId() {
      return new URLSearchParams(window.location.search).get('id');
    }

    function renderProduct(producto) {
      productoActual = producto;
      document.title = `${producto.nombre} - Sweet Bakery`;

      const ingredientesHTML = producto.ingredientes
        ? producto.ingredientes.split(',').map(i => `<span class="ingredient-tag">${i.trim()}</span>`).join('')
        : '';

      const alergenos = producto.alergenos
        ? `<div class="mb-3">
            <h6 class="fw-bold mb-2">Alérgenos:</h6>
            <p class="text-secondary small">${producto.alergenos}</p>
          </div>`
        : '';

      const html = `
        <div class="col-12 col-md-6">
          <img src="${producto.imagenPrincipal}" alt="${producto.nombre}" class="product-image"
              onerror="this.src='https://via.placeholder.com/600x600?text=🍰'"/>
        </div>
        <div class="col-12 col-md-6">
          <h1 class="h3 mb-2">${producto.nombre}</h1>
          <p class="text-secondary mb-3">${producto.categoriaId?.nombreCategoria || ''}</p>
          <p class="h4 text-primary fw-bold mb-4">$${Number(producto.precio).toLocaleString('es-CO')}</p>

          <p class="mb-3">${producto.descripcion || ''}</p>

          ${ingredientesHTML ? `<div class="mb-4">
            <h6 class="fw-bold mb-2">Ingredientes:</h6>
            ${ingredientesHTML}
          </div>` : ''}

          ${alergenos}

          <div class="mb-4">
            <label class="d-block fw-bold mb-2">Cantidad:</label>
            <div class="quantity-control">
              <button onclick="decreaseQty()">−</button>
              <span id="quantity">1</span>
              <button onclick="increaseQty()">+</button>
            </div>
          </div>

          <button class="btn-primary-custom mb-3" onclick="addToCart()">
            <i class="bi bi-cart-plus"></i> Agregar al Carrito
          </button>

          <button class="btn btn-outline-primary w-100">
            <i class="bi bi-heart"></i> Agregar a Favoritos
          </button>
        </div>
      `;

      document.getElementById('product-detail').innerHTML = html;
    }

    function increaseQty() {
      const el = document.getElementById('quantity');
      el.textContent = parseInt(el.textContent) + 1;
    }

    function decreaseQty() {
      const el = document.getElementById('quantity');
      const qty = parseInt(el.textContent);
      if (qty > 1) el.textContent = qty - 1;
    }

    function addToCart() {
      if (!productoActual) return;
      const cantidad = parseInt(document.getElementById('quantity').textContent);
      const carrito  = obtenerCarrito();
      const existente = carrito.find(p => p._id === productoActual._id);

      if (existente) {
        existente.cantidad += cantidad;
      } else {
        carrito.push({ ...productoActual, cantidad });
      }

      guardarCarrito(carrito);
      mostrarNotificacion('¡Agregado al carrito! 🛒');
    }

    // Cargar producto desde la API
    const id = getProductId();
    if (id) {
      fetch(`http://localhost:3000/api/productos/${id}`)
        .then(r => r.json())
        .then(data => renderProduct(data))
        .catch(err => {
          console.error('Error al cargar producto:', err);
          document.getElementById('product-detail').innerHTML =
            '<p class="col-12 text-center text-muted py-5">No se pudo cargar el producto.</p>';
        });
    } else {
      document.getElementById('product-detail').innerHTML =
        '<p class="col-12 text-center text-muted py-5">Producto no encontrado.</p>';
    }
  </script>
</body>
</html>
