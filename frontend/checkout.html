<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Sweet Bakery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>
   <!-- ========== HEADER (cargado automáticamente) ========== -->
  <div id="header-placeholder"></div>
 
  <!-- Espaciador para compensar el header fixed-top -->
  <div class="header-height"></div>

  <!-- Main Content -->
  <main>
    <div class="container py-4">
      <h1 class="h2 mb-4">Checkout</h1>

      <!-- Step Indicator -->
      <div class="step-indicator">
        <div class="step active">
          <div class="step-number">1</div>
          <div class="step-label">Envío</div>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <div class="step-label">Pago</div>
        </div>
        <div class="step">
          <div class="step-number">3</div>
          <div class="step-label">Confirmación</div>
        </div>
      </div>

      <div class="row">
        <div class="col-12 col-md-8">
          <!-- Shipping Form -->
          <div class="form-section">
            <h5 class="fw-bold mb-3">Información de Envío</h5>
            <form id="shippingForm">
              <div class="row">
                <div class="col-12 col-md-6 mb-3">
                  <label class="form-label fw-bold">Nombre Completo</label>
                  <input type="text" class="form-control" placeholder="Juan Pérez" required>
                </div>
                <div class="col-12 col-md-6 mb-3">
                  <label class="form-label fw-bold">Email</label>
                  <input type="email" class="form-control" placeholder="juan@example.com" required>
                </div>
              </div>
              <div class="row">
                <div class="col-12 col-md-6 mb-3">
                  <label class="form-label fw-bold">Teléfono</label>
                  <input type="tel" class="form-control" placeholder="+56912345678" required>
                </div>
                <div class="col-12 col-md-6 mb-3">
                  <label class="form-label fw-bold">Dirección</label>
                  <input type="text" class="form-control" placeholder="Calle 123, Apt 4" required>
                </div>
              </div>
              <div class="row">
                <div class="col-12 col-md-4 mb-3">
                  <label class="form-label fw-bold">Ciudad</label>
                  <input type="text" class="form-control" placeholder="Santiago" required>
                </div>
                <div class="col-12 col-md-4 mb-3">
                  <label class="form-label fw-bold">Región</label>
                  <input type="text" class="form-control" placeholder="RM" required>
                </div>
                <div class="col-12 col-md-4 mb-3">
                  <label class="form-label fw-bold">Código Postal</label>
                  <input type="text" class="form-control" placeholder="8320000" required>
                </div>
              </div>
            </form>
          </div>

          <!-- Payment Method -->
          <div class="form-section">
            <h5 class="fw-bold mb-3">Método de Pago</h5>
            
            <div class="payment-option active" onclick="selectPayment(this, 'card')">
              <div class="d-flex align-items-center">
                <i class="bi bi-credit-card" style="font-size: 1.5rem; margin-right: 1rem; color: var(--primary);"></i>
                <div>
                  <h6 class="mb-0 fw-bold">Tarjeta de Crédito/Débito</h6>
                  <small class="text-secondary">Visa, MasterCard, etc.</small>
                </div>
              </div>
            </div>

            <div class="payment-option" onclick="selectPayment(this, 'transfer')">
              <div class="d-flex align-items-center">
                <i class="bi bi-bank" style="font-size: 1.5rem; margin-right: 1rem;"></i>
                <div>
                  <h6 class="mb-0 fw-bold">Transferencia Bancaria</h6>
                  <small class="text-secondary">Depósito directo</small>
                </div>
              </div>
            </div>

            <div class="payment-option" onclick="selectPayment(this, 'paypal')">
              <div class="d-flex align-items-center">
                <i class="bi bi-wallet2" style="font-size: 1.5rem; margin-right: 1rem;"></i>
                <div>
                  <h6 class="mb-0 fw-bold">PayPal</h6>
                  <small class="text-secondary">Pago seguro en línea</small>
                </div>
              </div>
            </div>
          </div>

          <!-- Card Payment Form -->
          <div id="cardPayment" class="form-section">
            <h5 class="fw-bold mb-3">Detalles de la Tarjeta</h5>
            <div class="mb-3">
              <label class="form-label fw-bold">Número de Tarjeta</label>
              <input type="text" class="form-control" placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="row">
              <div class="col-12 col-md-6 mb-3">
                <label class="form-label fw-bold">Vencimiento</label>
                <input type="text" class="form-control" placeholder="MM/YY" maxlength="5">
              </div>
              <div class="col-12 col-md-6 mb-3">
                <label class="form-label fw-bold">CVV</label>
                <input type="text" class="form-control" placeholder="123" maxlength="3">
              </div>
            </div>
          </div>

          <button class="btn-primary-custom" onclick="completeCheckout()">
            Completar Compra
          </button>
        </div>

        <!-- Order Summary -->
        <div class="col-12 col-md-4">
          <div class="form-section">
            <h6 class="fw-bold mb-3">Resumen del Pedido</h6>
            <div id="order-summary" style="font-size: 0.95rem;">
              <p class="text-secondary">Cargando...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

   <!-- Footer -->
  
  <div id="footer-placeholder"></div>
  <div id="bottomnav-placeholder"></div>
 
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
  <!-- Componentes reutilizables (header + footer) -->
  <script src="js/components.js"></script>

 

  <script>
    function selectPayment(element, method) {
      document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
      element.classList.add('active');
      
      const cardPayment = document.getElementById('cardPayment');
      if (method === 'card') {
        cardPayment.style.display = 'block';
      } else {
        cardPayment.style.display = 'none';
      }
    }

    function loadOrderSummary() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      
      if (cart.length === 0) {
        document.getElementById('order-summary').innerHTML = '<p class="text-danger">El carrito está vacío</p>';
        return;
      }
      
      let subtotal = 0;
      const itemsHtml = cart.map(item => {
        const total = item.precio * item.quantity;
        subtotal += total;
        return `
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #f0f0f0;">
            <span>${item.nombre} x${item.quantity}</span>
            <span>$${total.toFixed(2)}</span>
          </div>
        `;
      }).join('');
      
      const total = subtotal + 5;
      document.getElementById('order-summary').innerHTML = itemsHtml + `
        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--primary);">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span>Subtotal</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span>Envío</span>
            <span>$5.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; color: var(--primary);">
            <span>Total</span>
            <span>$${total.toFixed(2)}</span>
          </div>
        </div>
      `;
    }

    function completeCheckout() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        alert('El carrito está vacío');
        return;
      }

      // Store order data
      const orderNumber = Math.floor(Math.random() * 900000) + 100000;
      const orderData = {
        orderNumber,
        items: cart,
        total: cart.reduce((sum, item) => sum + (item.precio * item.quantity), 0) + 5,
        date: new Date().toISOString()
      };
      
      localStorage.setItem('lastOrder', JSON.stringify(orderData));
      localStorage.removeItem('cart');
      
      window.location.href = 'confirmacion.html';
    }

    loadOrderSummary();
  </script>
</body>
</html>
